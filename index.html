<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Picksy - AI 가치 저울</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.24.4/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400;500;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: white; word-break: keep-all; overflow-wrap: break-word; }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        button { touch-action: manipulation; cursor: pointer; -webkit-appearance: none; }
        input, textarea { font-size: 16px; touch-action: manipulation; }
        @media (max-width: 640px) { body { overscroll-behavior: none; } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Icons
        const Icons = {
            BrainCircuit: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 5a3 3 0 1 0-5.997.125 4 4 0 0 0-2.526 5.77 4 4 0 0 0 .556 6.588A4 4 0 1 0 12 18Z"/><path d="M12 5a3 3 0 1 1 5.997.125 4 4 0 0 1 2.526 5.77 4 4 0 0 1-.556 6.588A4 4 0 1 1 12 18Z"/><path d="M15 13a4.5 4.5 0 0 1-3-4 4.5 4.5 0 0 1-3 4"/><path d="M17.599 6.5a3 3 0 0 0 .399-1.375"/><path d="M6.003 5.125A3 3 0 0 0 6.401 6.5"/><path d="M3.477 10.896a4 4 0 0 1 .585-.396"/><path d="M19.938 10.5a4 4 0 0 1 .585.396"/><path d="M6 18a4 4 0 0 1-1.97-3.284"/><path d="M17.97 14.716A4 4 0 0 1 18 18"/></svg>,
            ArrowRight: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>,
            ChevronLeft: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m15 18-6-6 6-6"/></svg>,
            RefreshCw: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/></svg>,
            BarChart2: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" x2="18" y1="20" y2="10"/><line x1="12" x2="12" y1="20" y2="4"/><line x1="6" x2="6" y1="20" y2="14"/></svg>,
            Share2: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" x2="15.42" y1="13.51" y2="17.49"/><line x1="15.41" x2="8.59" y1="6.51" y2="10.49"/></svg>,
            Loader2: ({className}) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
        };

        // Fallback Logic (API 실패 시 작동)
        function getLocalAnalysis(optionA, optionB) {
            return [
                { factorName: "초기 비용", winner: optionA, score1Label: "비용 상관없이 가치 중시", score10Label: "가성비와 저렴한 가격" },
                { factorName: "리스크", winner: optionB, score1Label: "안정적이고 보수적인 선택", score10Label: "모험적이고 새로운 시도" },
                { factorName: "보상 시점", winner: optionA, score1Label: "참았다가 나중에 크게", score10Label: "지금 당장의 만족" },
                { factorName: "대중성", winner: optionB, score1Label: "나만의 개성 추구", score10Label: "남들이 많이 하는 검증된 선택" },
                { factorName: "디자인", winner: optionA, score1Label: "성능과 실용성 위주", score10Label: "세련되고 예쁜 외관" }
            ];
        }

        function App() {
            const [step, setStep] = useState(1);
            const [loading, setLoading] = useState(false);
            const [optionA, setOptionA] = useState("");
            const [optionB, setOptionB] = useState("");
            const [context, setContext] = useState("");
            const [factors, setFactors] = useState([]);
            const [result, setResult] = useState(null);
            const [showDetails, setShowDetails] = useState(false);
            const [weights, setWeights] = useState({});

            const callGroq = async (userPrompt, systemPrompt = "") => {
                const messages = systemPrompt
                    ? [{ role: "system", content: systemPrompt }, { role: "user", content: userPrompt }]
                    : [{ role: "user", content: userPrompt }];
                const res = await fetch("/api/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ model: "llama-3.3-70b-versatile", messages, temperature: 0.3 })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error?.message || "API 호출 실패");
                return data.choices?.[0]?.message?.content;
            };

            const extractJSON = (text) => {
                const start = text.indexOf("[");
                const end = text.lastIndexOf("]");
                if (start === -1 || end === -1 || end <= start) throw new Error("JSON 파싱 실패");
                return JSON.parse(text.slice(start, end + 1));
            };

            const handleAnalyze = async () => {
                if (!optionA || !optionB) return;
                setLoading(true);
                try {
                    const systemPrompt = `너는 두 선택지의 특징을 분석해 '블라인드 가치 저울'을 만드는 전문가야.
규칙:
1. JSON 배열만 출력.
2. factorName: 두 대상을 판가름할 핵심 기준 5개
3. winner: 이 기준에서 더 우세한 선택지 이름 (반드시 "${optionA}" 또는 "${optionB}" 중 하나)
4. labelLow: winner의 반대편(1점 방향) 기기가 가지는 특징이나 가치관 (짧은 문구)
5. labelHigh: winner(10점 방향) 기기가 가지는 특징이나 가치관 (짧은 문구)
JSON 형식: [{"factorName":"가격", "winner":"${optionB}", "labelLow":"가성비 중요", "labelHigh":"프리미엄 추구"}]`;

                    const thinkText = await callGroq('"' + optionA + '"와 "' + optionB + '"의 상반된 특징 5가지를 단어로 뽑아줘.');
                    const prompt = '"' + optionA + '" vs "' + optionB + '"\n특징: ' + thinkText + '\n위 기준으로 JSON 생성.';

                    const text = await callGroq(prompt, systemPrompt);
                    const parsed = extractJSON(text);

                    const valid = parsed.map(f => ({
                        factorName: f.factorName,
                        winner: f.winner === optionA ? optionA : optionB,
                        userImportance: 5,
                        score1Label: f.labelLow,
                        score10Label: f.labelHigh,
                    }));

                    setFactors(valid);
                    setStep(2);
                } catch (e) {
                    console.error("API 실패, 기본값 사용", e);
                    setFactors(getLocalAnalysis(optionA, optionB).map(f => ({...f, userImportance: 5})));
                    setStep(2);
                } finally {
                    setLoading(false);
                }
            };

            const calculateResult = async () => {
                let scoreA = 0;
                let scoreB = 0;
                const details = [];

                factors.forEach(f => {
                    const w = weights[f.factorName] || 1; 
                    const val = f.userImportance; 

                    let ptsWinner = val * w;
                    let ptsOpponent = (11 - val) * w;

                    let ptsA = f.winner === optionA ? ptsWinner : ptsOpponent;
                    let ptsB = f.winner === optionB ? ptsWinner : ptsOpponent;

                    scoreA += ptsA;
                    scoreB += ptsB;

                    details.push({
                        factorName: f.factorName,
                        wonBy: ptsA >= ptsB ? optionA : optionB,
                        ptsGap: Math.abs(ptsA - ptsB),
                        chosenValue: ptsA >= ptsB 
                            ? (ptsA === ptsWinner ? f.score10Label : f.score1Label)
                            : (ptsB === ptsWinner ? f.score10Label : f.score1Label)
                    });
                });

                const winner = scoreA >= scoreB ? optionA : optionB;

                setStep(3);
                await new Promise(r => setTimeout(r, 2000));
                setResult({ scoreA, scoreB, winner, details });
                setStep(4);
            };

            const reset = () => { setStep(1); setOptionA(""); setOptionB(""); setContext(""); setFactors([]); setResult(null); setShowDetails(false); };

            return (
                <div className="min-h-screen flex flex-col p-6 relative bg-[#050505] text-white font-sans selection:bg-blue-500/30" style={{overflowX:"hidden", overflowY:"auto"}}>
                    <div className="w-full max-w-7xl mx-auto flex flex-col flex-1 relative z-10">
                        <div className="flex justify-between items-center mb-6 md:mb-24">
                            <div className="group flex items-center gap-3 cursor-pointer" onClick={reset}>
                                <div className="p-2 bg-white/5 rounded-xl border border-white/5 group-hover:border-white/20 transition-colors">
                                    <Icons.BrainCircuit className="w-6 h-6 text-blue-400" />
                                </div>
                                <span className="text-xl font-light tracking-wide text-gray-300">Picksy</span>
                            </div>
                        </div>

                        {step === 1 && (
                            <div className="flex-1 flex flex-col justify-start md:justify-center max-w-5xl mx-auto w-full animate-fade-in">
                                <div className="text-center mb-4 md:mb-16">
                                    <h2 className="text-2xl md:text-7xl font-thin tracking-tight mb-4 text-white">어떤 선택을 앞두고 계신가요?</h2>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4 md:gap-24 mb-16 relative">
                                    <div className="hidden md:flex absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 w-12 h-12 items-center justify-center rounded-full bg-[#050505] border border-white/10 text-gray-600 font-serif italic z-10">vs</div>
                                    <div className="text-center">
                                        <label className="block text-sm text-blue-400 uppercase tracking-widest font-medium mb-4">Option A</label>
                                        <input value={optionA} onChange={(e) => setOptionA(e.target.value)} placeholder="첫 번째 선택" className="w-full bg-transparent text-4xl md:text-5xl font-light placeholder:text-white/10 outline-none border-b border-white/10 py-4 focus:border-blue-500/50 text-center" />
                                    </div>
                                    <div className="text-center">
                                        <label className="block text-sm text-purple-400 uppercase tracking-widest font-medium mb-4">Option B</label>
                                        <input value={optionB} onChange={(e) => setOptionB(e.target.value)} placeholder="두 번째 선택" className="w-full bg-transparent text-4xl md:text-5xl font-light placeholder:text-white/10 outline-none border-b border-white/10 py-4 focus:border-purple-500/50 text-center" />
                                    </div>
                                </div>
                                <div className="flex justify-center">
                                    <button onClick={handleAnalyze} disabled={!optionA || !optionB || loading} className="group relative px-8 py-5 bg-white text-black rounded-full text-lg font-medium transition-all hover:scale-105 disabled:opacity-50">
                                        {loading ? <Icons.Loader2 className="w-6 h-6 animate-spin" /> : <span className="flex items-center gap-3">가치 저울 설계하기 <Icons.ArrowRight className="w-5 h-5" /></span>}
                                    </button>
                                </div>
                            </div>
                        )}

                        {step === 2 && (
                            <div className="flex-1 flex flex-col max-w-4xl mx-auto w-full animate-fade-in">
                                <div className="text-center mb-24">
                                    <h2 className="text-4xl md:text-6xl font-thin tracking-tight mb-6">당신의 가치관은 어디에 가깝나요?</h2>
                                    <p className="text-gray-500 text-lg">선택지의 이름은 잊고 오직 '가치'에만 집중해서 슬라이더를 움직이세요.</p>
                                </div>
                                <div className="space-y-20 mb-24">
                                    {factors.map((factor, idx) => (
                                        <div key={idx} className="relative group">
                                            <div className="flex flex-col gap-6">
                                                <div className="flex flex-col items-center text-center gap-3">
                                                    <h3 className="text-2xl font-medium text-white">{factor.factorName}</h3>
                                                    <div className="flex items-center gap-1.5">
                                                        {[1,2,3,4,5].map(w => (
                                                            <button key={w} onClick={() => setWeights(prev => ({...prev, [factor.factorName]: w}))} className={`text-2xl leading-none transition-all ${(weights[factor.factorName] || 1) >= w ? 'text-yellow-400' : 'text-white/15'}`}>★</button>
                                                        ))}
                                                    </div>
                                                </div>
                                                <div className="relative pt-4 pb-2 px-4">
                                                    <div className="flex justify-between text-sm font-medium tracking-wide mb-6">
                                                        <span className="text-blue-400">{factor.score1Label}</span>
                                                        <span className="text-purple-400">{factor.score10Label}</span>
                                                    </div>
                                                    <input type="range" min="1" max="10" step="0.1" value={factor.userImportance} onChange={(e) => {
                                                        const newFactors = [...factors];
                                                        newFactors[idx].userImportance = Number(e.target.value);
                                                        setFactors(newFactors);
                                                    }} className="w-full h-2 bg-white/20 rounded-lg appearance-none cursor-pointer" />
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                                <div className="flex justify-center gap-6 pb-20">
                                    <button onClick={calculateResult} className="px-8 py-4 bg-white text-black rounded-full text-base font-bold transition-all hover:scale-105">최종 결과 확인하기</button>
                                </div>
                            </div>
                        )}

                        {step === 3 && (
                            <div className="flex-1 flex flex-col items-center justify-center gap-8">
                                <Icons.BrainCircuit className="w-12 h-12 text-blue-400 opacity-70 animate-pulse" />
                                <p className="text-xl font-light text-white">가치관 분석 및 점수 누적 중...</p>
                            </div>
                        )}

                        {step === 4 && result && (
                            <div className="flex-1 flex flex-col items-center justify-center max-w-5xl mx-auto w-full py-12 animate-fade-in">
                                <div className="text-center space-y-12 mb-20">
                                    <h2 className="text-2xl text-gray-400 font-light tracking-wide">당신의 가치관이 향한 최종 선택은</h2>
                                    <h1 className="text-6xl md:text-9xl font-bold bg-gradient-to-r from-blue-300 via-white to-purple-300 bg-clip-text text-transparent py-4">{result.winner}</h1>
                                    
                                    <div className="w-full max-w-lg mx-auto space-y-4">
                                        <span className="text-gray-400 text-sm uppercase tracking-[0.2em] font-semibold">최종 획득 점수</span>
                                        <div className="w-full h-10 flex rounded-full overflow-hidden border border-white/10">
                                            <div style={{width: `${(result.scoreA / (result.scoreA + result.scoreB)) * 100}%`}} className="bg-blue-600 flex items-center justify-start px-4 text-sm font-bold">
                                                {optionA} {Math.round(result.scoreA)}점
                                            </div>
                                            <div style={{width: `${(result.scoreB / (result.scoreA + result.scoreB)) * 100}%`}} className="bg-purple-600 flex items-center justify-end px-4 text-sm font-bold">
                                                {Math.round(result.scoreB)}점 {optionB}
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <div className="flex gap-4 justify-center w-full max-w-md mb-12">
                                    <button onClick={reset} className="flex-1 px-6 py-4 rounded-3xl border border-white/10 hover:bg-white/5 text-gray-400">다시 시작</button>
                                    <button onClick={() => setShowDetails(!showDetails)} className="flex-1 px-6 py-4 rounded-3xl bg-white/10 text-white border border-white/5">{showDetails ? "분석 닫기" : "선택의 이유 보기"}</button>
                                </div>

                                {showDetails && (
                                    <div className="w-full max-w-4xl bg-white/5 rounded-[2rem] p-8 md:p-12 space-y-8 border border-white/5">
                                        <h4 className="text-lg font-medium text-center text-gray-300">이 결과를 만든 결정적 이유</h4>
                                        <div className="space-y-4">
                                            {result.details.map((detail, idx) => (
                                                <div key={idx} className="p-6 rounded-2xl bg-[#0a0a0a] border border-white/5">
                                                    <div className="flex items-center gap-4 mb-3">
                                                        <span className={`px-3 py-1 text-xs font-bold rounded-full ${detail.wonBy === optionA ? 'bg-blue-500/
